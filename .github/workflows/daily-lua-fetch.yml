name: Daily Lua Fetch for New Releases

on:
  schedule:
    - cron: '0 6 * * *'  # Runs every day at 6:00 AM UTC (11:30 AM IST)
  workflow_dispatch:       # Also allows manual trigger

permissions:
  contents: write
  actions: write

jobs:
  fetch-new-luas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Discover new games and fetch luas
        run: |
          python - << 'SCRIPT'
          import requests
          from bs4 import BeautifulSoup
          import re
          import os
          import zipfile
          import time

          STEAM_URL = "https://store.steampowered.com/search/?sort_by=Released_DESC&category1=998&os=win"
          USER_AGENT = "discord(dot)gg/luatools"
          GAMES_DIR = "games"

          APIS = [
              {"name": "Ryuu", "url": "http://167.235.229.108/<appid>"},
              {"name": "TwentyTwo Cloud", "url": "https://api.twentytwocloud.com/download?appid=<appid>"},
              {"name": "Sushi", "url": "https://raw.githubusercontent.com/sushi-dev55-alt/sushitools-games-repo-alt/refs/heads/main/<appid>.zip"},
          ]

          # Step 1: Get existing lua files so we skip them
          existing = set()
          for f in os.listdir(GAMES_DIR):
              if f.endswith(".lua"):
                  existing.add(f.replace(".lua", ""))
          print(f"Already have {len(existing)} lua files in games/")

          # Step 2: Scrape Steam for new releases
          print("Scraping Steam for new releases...")
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/91.0.4472.124"}
          resp = requests.get(STEAM_URL, headers=headers, timeout=15)
          soup = BeautifulSoup(resp.text, "html.parser")
          rows = soup.find_all("a", class_="search_result_row")

          new_games = []
          for row in rows:
              appid = row.get("data-ds-appid")
              title_tag = row.find("span", class_="title")
              if appid and title_tag:
                  name = title_tag.get_text(strip=True)
                  if appid not in existing:
                      new_games.append((appid, name))

          print(f"Found {len(new_games)} games without lua files")

          # Step 3: Try to download lua for each new game
          downloaded = 0
          for appid, name in new_games:
              print(f"\n[{appid}] {name}")
              
              for api in APIS:
                  url = api["url"].replace("<appid>", appid)
                  try:
                      print(f"  Trying {api['name']}...", end=" ")
                      r = requests.get(url, headers={"User-Agent": USER_AGENT}, timeout=30)
                      
                      if r.status_code == 404:
                          print("Not available")
                          continue
                      if r.status_code != 200:
                          print(f"Error ({r.status_code})")
                          continue
                      if r.content[:2] != b"PK":
                          print("Not a zip")
                          continue

                      # Extract .lua from zip
                      zip_path = f"/tmp/{appid}.zip"
                      with open(zip_path, "wb") as f:
                          f.write(r.content)

                      with zipfile.ZipFile(zip_path, "r") as archive:
                          candidates = [n for n in archive.namelist() if re.fullmatch(r".*\d+\.lua", os.path.basename(n))]
                          chosen = None
                          for n in candidates:
                              if os.path.basename(n) == f"{appid}.lua":
                                  chosen = n
                                  break
                          if not chosen and candidates:
                              chosen = candidates[0]
                          
                          if chosen:
                              data = archive.read(chosen)
                              lua_path = os.path.join(GAMES_DIR, f"{appid}.lua")
                              with open(lua_path, "wb") as f:
                                  f.write(data)
                              print(f"SUCCESS! Downloaded {appid}.lua")
                              downloaded += 1
                              break
                          else:
                              print("No .lua in zip")
                      
                      os.remove(zip_path)
                  except Exception as e:
                      print(f"Failed ({e})")
              
              # Small delay between games to be respectful
              time.sleep(0.5)

          print(f"\n=== Done: {downloaded} new lua files downloaded ===")
          SCRIPT

      - name: Commit new lua files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: daily lua fetch - new game releases"
          file_pattern: "games/*.lua"
          branch: main

      - name: Trigger Index Generation
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run generate-index.yml || true
