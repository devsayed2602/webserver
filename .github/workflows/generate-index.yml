name: Generate Games Index

on:
  push:
    branches: [main]
    paths:
      - 'games/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate games index
        run: python generate_index.py
      
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: games_index.json
          tag_name: data-${{ steps.date.outputs.date }}
          name: Games Index ${{ steps.date.outputs.date }}
          body: |
            Auto-generated games index file.
            
            Contains app IDs for all available Lua patches.
            
            Download URL: https://github.com/${{ github.repository }}/releases/latest/download/games_index.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
